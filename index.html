<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CPRタイマー Ver.1.2</title>
  <style>
    :root{
      --bg:#0f141a;--panel:#151b22;--line:#2a3540;--text:#eaf0f6;--muted:#9aa7b4;
      --yellow:#ffd86b;--green:#9df2a6;--cyan:#9cf7ff;--blue:#8bdcff;--red:#ff7b7b;--orange:#ffb36b;
      --btn:#263241;--dark:#101820;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:8px;-webkit-tap-highlight-color:transparent}
    .app{max-width:920px;margin:0 auto;padding-bottom:24px}
    .top{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg) 90%,rgba(15,20,26,0));padding-bottom:8px}
    h1{font-size:22px;margin:3px 0 6px;line-height:1.2}.ver{color:var(--muted);font-size:13px;font-weight:600}
    .clock{font-size:46px;font-weight:900;letter-spacing:1px;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:8px;margin-bottom:8px;font-variant-numeric:tabular-nums}
    .summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.mini{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center}.miniLabel{font-size:13px;color:var(--muted)}.miniValue{font-size:24px;font-weight:900;font-variant-numeric:tabular-nums}
    .main{display:grid;grid-template-columns:1fr 230px;gap:10px;align-items:start}
    .timeline{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:10px;min-height:520px;overflow:hidden}.timelineHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:900}.timelineHint{font-size:12px;color:var(--muted);font-weight:600}
    .logFlow{height:500px;overflow:auto;padding:6px 4px 20px 4px;display:flex;flex-direction:column;gap:7px}.logItem{background:var(--dark);border:1px solid var(--line);border-left:5px solid var(--yellow);border-radius:10px;padding:8px 10px;font-size:17px;line-height:1.35;box-shadow:0 2px 0 rgba(0,0,0,.18);width:92%}.logItem:nth-child(6n+1){margin-left:0}.logItem:nth-child(6n+2){margin-left:12px}.logItem:nth-child(6n+3){margin-left:24px}.logItem:nth-child(6n+4){margin-left:36px}.logItem:nth-child(6n+5){margin-left:48px}.logItem:nth-child(6n+6){margin-left:60px}.time{color:var(--yellow);font-weight:900;margin-right:5px}.meta{font-size:13px;color:var(--muted);margin-top:2px}.empty{color:var(--muted);font-size:16px;padding:16px;text-align:center;border:1px dashed var(--line);border-radius:12px}
    .side{display:grid;grid-template-columns:1fr;gap:8px;position:sticky;top:132px}.btn{border:1px solid rgba(255,255,255,.08);border-radius:14px;color:var(--text);font-weight:900;min-height:86px;padding:9px 7px;font-size:18px;box-shadow:0 2px 0 rgba(0,0,0,.35);touch-action:manipulation}.btn:active{transform:translateY(1px);box-shadow:none}.label{font-size:20px;line-height:1.15}.sub{font-size:13px;opacity:.9;margin-top:4px}.timer{font-size:30px;font-variant-numeric:tabular-nums;margin-top:3px}.start{background:#1e4d2b;color:#dcffdf}.airway{background:#244f2b;color:#d9ffd9}.iv{background:#174a50;color:#d9fdff}.epi{background:#183b55;color:#caecff}.shock{background:#642222;color:#ffd0d0}.reset{background:#34202a;color:#ffccd9;min-height:48px;font-size:15px}.expired{color:#ff3b3b!important;text-shadow:0 0 10px rgba(255,70,70,.45)}
    .note{font-size:12px;color:var(--muted);line-height:1.45;margin-top:8px}
    @media(max-width:700px){.clock{font-size:39px}.main{grid-template-columns:1fr 150px;gap:8px}.side{top:124px}.btn{min-height:78px}.label{font-size:17px}.timer{font-size:26px}.logFlow{height:480px}.logItem{font-size:15px;width:96%}.logItem:nth-child(6n+1){margin-left:0}.logItem:nth-child(6n+2){margin-left:7px}.logItem:nth-child(6n+3){margin-left:14px}.logItem:nth-child(6n+4){margin-left:21px}.logItem:nth-child(6n+5){margin-left:28px}.logItem:nth-child(6n+6){margin-left:35px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>CPRタイマー <span class="ver">Ver.1.2</span></h1>
      <div id="clock" class="clock">--:--:--</div>
      <div class="summary">
        <div class="mini"><div class="miniLabel">CPR経過</div><div id="cprElapsed" class="miniValue">00:00</div></div>
        <div class="mini"><div class="miniLabel">最終記録</div><div id="lastAction" class="miniValue">未記録</div></div>
      </div>
    </div>

    <div class="main">
      <section class="timeline">
        <div class="timelineHead">
          <span>時系列ログ</span>
          <span class="timelineHint">新しい記録ほど下に流れます</span>
        </div>
        <div id="logFlow" class="logFlow">
          <div class="empty">右側のボタンを押すと、半角ずらしで時系列ログが並びます。</div>
        </div>
      </section>

      <aside class="side">
        <button class="btn start" id="cprBtn"><div class="label">CPR開始</div><div class="sub">開始時刻を記録</div></button>
        <button class="btn airway" id="airwayBtn"><div class="label">LT／挿管</div><div class="sub">実施時刻を記録</div></button>
        <button class="btn iv" id="ivBtn"><div class="label">IV確保</div><div class="sub">実施時刻を記録</div></button>
        <button class="btn epi" id="epiBtn"><div class="label">アドレナリン</div><div class="sub" id="epiSub">次：1投目</div><div class="timer" id="epiTimer">--:--</div></button>
        <button class="btn shock" id="shockBtn"><div class="label">ショック⚡️</div><div class="sub" id="shockSub">次：1回目</div><div class="timer" id="shockTimer">--:--</div></button>
        <button class="btn reset" id="resetBtn">全リセット</button>
      </aside>
    </div>
    <div class="note">※音声操作・心マ停止カウントは削除。アドレナリンは実施後4:00、ショックは実施後2:00でカウントダウンします。</div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const state = {
    cprStart:null, logs:[], epiCount:0, shockCount:0,
    epiEnd:null, shockEnd:null, audioReady:false
  };

  function pad(n){return String(n).padStart(2,'0')}
  function now(){return new Date()}
  function hhmm(d=new Date()){return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
  function hhmmss(d=new Date()){return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
  function mmss(ms){
    const total=Math.max(0,Math.ceil(ms/1000));
    return `${pad(Math.floor(total/60))}:${pad(total%60)}`;
  }
  function elapsedText(start){
    if(!start) return '00:00';
    const sec=Math.floor((Date.now()-start)/1000);
    return `${pad(Math.floor(sec/60))}:${pad(sec%60)}`;
  }

  let audioCtx=null;
  function readyAudio(){
    if(state.audioReady) return;
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); state.audioReady=true; }catch(e){}
  }
  function beep(){
    readyAudio();
    if(!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=880; g.gain.value=0.04;
    o.connect(g); g.connect(audioCtx.destination); o.start();
    setTimeout(()=>{try{o.stop()}catch(e){}},260);
    if(navigator.vibrate) navigator.vibrate([160,80,160]);
  }

  function addLog(text, cls='', meta=''){
    const item = {time:hhmm(), text, cls, meta};
    state.logs.push(item);
    $('lastAction').textContent = item.time;
    renderLogs();
  }
  function renderLogs(){
    const box=$('logFlow'); box.innerHTML='';
    state.logs.forEach((l)=>{
      const div=document.createElement('div');
      div.className='logItem';
      if(l.cls) div.style.borderLeftColor = l.cls;
      div.innerHTML=`<span class="time">${l.time}</span>${escapeHtml(l.text)}${l.meta?`<div class="meta">${escapeHtml(l.meta)}</div>`:''}`;
      box.appendChild(div);
    });
    box.scrollTop = box.scrollHeight;
  }
  function escapeHtml(s){return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

  function countdown(end, el){
    if(!end){el.textContent='--:--'; el.classList.remove('expired'); return;}
    const diff=end-Date.now();
    if(diff<=0){el.textContent='00:00'; el.classList.add('expired'); return;}
    el.textContent=mmss(diff); el.classList.remove('expired');
  }
  let epiAlerted=false, shockAlerted=false;
  function tick(){
    $('clock').textContent=hhmmss();
    $('cprElapsed').textContent=elapsedText(state.cprStart);
    countdown(state.epiEnd,$('epiTimer'));
    countdown(state.shockEnd,$('shockTimer'));
    if(state.epiEnd && Date.now()>=state.epiEnd && !epiAlerted){epiAlerted=true; beep();}
    if(state.shockEnd && Date.now()>=state.shockEnd && !shockAlerted){shockAlerted=true; beep();}
  }

  $('cprBtn').addEventListener('click',()=>{readyAudio(); if(!state.cprStart) state.cprStart=Date.now(); addLog('CPR開始','#9df2a6');});
  $('airwayBtn').addEventListener('click',()=>{readyAudio(); addLog('LT／挿管 実施','#9df2a6');});
  $('ivBtn').addEventListener('click',()=>{readyAudio(); addLog('IV確保 完了','#9cf7ff');});
  $('epiBtn').addEventListener('click',()=>{readyAudio(); state.epiCount++; state.epiEnd=Date.now()+4*60*1000; epiAlerted=false; $('epiSub').textContent=`次：${state.epiCount+1}投目`; addLog(`アドレナリン${state.epiCount}投目（${hhmm()}）`,'#8bdcff','4:00カウントダウン開始'); tick();});
  $('shockBtn').addEventListener('click',()=>{readyAudio(); state.shockCount++; state.shockEnd=Date.now()+2*60*1000; shockAlerted=false; $('shockSub').textContent=`次：${state.shockCount+1}回目`; addLog(`ショック${state.shockCount}回目実施（${hhmm()}）`,'#ff7b7b','2:00カウントダウン開始'); tick();});
  $('resetBtn').addEventListener('click',()=>{
    if(!confirm('全ての記録をリセットしますか？')) return;
    state.cprStart=null; state.logs=[]; state.epiCount=0; state.shockCount=0; state.epiEnd=null; state.shockEnd=null; epiAlerted=false; shockAlerted=false;
    $('epiSub').textContent='次：1投目'; $('shockSub').textContent='次：1回目'; $('lastAction').textContent='未記録';
    renderLogs();
    $('logFlow').innerHTML='<div class="empty">右側のボタンを押すと、半角ずらしで時系列ログが並びます。</div>';
    tick();
  });
  tick(); setInterval(tick,250);
})();
</script>
</body>
</html>
