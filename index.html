<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CPRタイマー Ver.1.7</title>
  <style>
    :root{
      --bg:#0f141a;--panel:#151b22;--line:#2a3540;--text:#eaf0f6;--muted:#9aa7b4;
      --yellow:#ffd86b;--green:#9df2a6;--cyan:#9cf7ff;--blue:#8bdcff;--red:#ff7b7b;--orange:#ffb36b;
      --btn:#263241;--dark:#101820;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:8px;-webkit-tap-highlight-color:transparent}
    .app{max-width:1180px;margin:0 auto;padding-bottom:16px}
    .top{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg) 92%,rgba(15,20,26,0));padding-bottom:8px}
    h1{font-size:22px;margin:3px 0 6px;line-height:1.2}.ver{color:var(--muted);font-size:13px;font-weight:600}
    .compactHead{display:flex;align-items:baseline;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:5px 10px;margin-bottom:6px}.clock{font-size:34px;font-weight:900;letter-spacing:1px;font-variant-numeric:tabular-nums}.elapsedParen{font-size:21px;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;white-space:nowrap}
    .main{display:grid;grid-template-columns:1fr 430px;gap:10px;align-items:start}
    .timeline{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:8px;min-height:560px;overflow:hidden}.timelineHead{display:none}.timelineHint{display:none}
    .logFlow{height:540px;overflow:auto;padding:6px 4px 20px 4px;display:flex;flex-direction:column;gap:7px}.logItem{background:var(--dark);border:1px solid var(--line);border-left:5px solid var(--yellow);border-radius:10px;padding:8px 10px;font-size:17px;line-height:1.35;box-shadow:0 2px 0 rgba(0,0,0,.18);width:92%}.logItem:nth-child(6n+1){margin-left:0}.logItem:nth-child(6n+2){margin-left:12px}.logItem:nth-child(6n+3){margin-left:24px}.logItem:nth-child(6n+4){margin-left:36px}.logItem:nth-child(6n+5){margin-left:48px}.logItem:nth-child(6n+6){margin-left:60px}.time{color:var(--yellow);font-weight:900;margin-right:5px}.meta{font-size:13px;color:var(--muted);margin-top:2px}.empty{color:var(--muted);font-size:16px;padding:16px;text-align:center;border:1px dashed var(--line);border-radius:12px}
    .sideWrap{position:sticky;top:94px;max-height:calc(100vh - 140px);overflow:auto;padding-right:2px}.sideTitle{font-size:12px;color:var(--muted);font-weight:900;margin:0 0 5px 2px}.sideGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}.btn{border:1px solid rgba(255,255,255,.08);border-radius:14px;color:var(--text);font-weight:900;min-height:92px;padding:9px 7px;font-size:18px;box-shadow:0 2px 0 rgba(0,0,0,.35);touch-action:manipulation}.btn:active{transform:translateY(1px);box-shadow:none}.label{font-size:20px;line-height:1.15}.sub{font-size:13px;opacity:.9;margin-top:4px}.timer{font-size:31px;font-variant-numeric:tabular-nums;margin-top:3px}.start{background:#1e4d2b;color:#dcffdf}.airway{background:#244f2b;color:#d9ffd9}.iv{background:#174a50;color:#d9fdff}.lucas{background:#3d3a1d;color:#fff2b8}.epi{background:#183b55;color:#caecff}.shock{background:#642222;color:#ffd0d0}.pulse{background:#1f5a35;color:#dcffdf}.cprPulse{background:#1f5a35;color:#dcffdf}.reset{background:#34202a;color:#ffccd9;min-height:48px;font-size:15px}.expired{color:#ff3b3b!important;text-shadow:0 0 10px rgba(255,70,70,.45)}
    .choiceBox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px;margin-bottom:8px}.choiceTitle{font-size:15px;color:var(--muted);font-weight:900;margin-bottom:6px}.choiceBtns{display:grid;grid-template-columns:1fr 1fr;gap:7px}.choiceBtns button{border:0;border-radius:11px;background:#304050;color:var(--text);padding:12px 6px;font-weight:900;font-size:15px}.doneArea{border-top:1px solid var(--line);padding-top:8px;margin-top:6px}.doneList{display:grid;grid-template-columns:1fr 1fr;gap:7px}.doneCard{background:#19222c;border:1px solid var(--line);border-radius:12px;padding:8px;font-size:13px;color:var(--muted)}.doneCard b{display:block;color:var(--text);font-size:15px}.doneCard button{margin-top:5px;width:100%;border:0;border-radius:8px;background:#354252;color:#eaf0f6;padding:6px;font-weight:800;font-size:12px}.hidden{display:none!important}.note{font-size:12px;color:var(--muted);line-height:1.45;margin-top:8px}
    @media(max-width:760px){.clock{font-size:30px}.elapsedParen{font-size:16px}.main{grid-template-columns:1fr 260px;gap:8px}.sideWrap{top:124px}.sideGrid{grid-template-columns:repeat(3,1fr)}.doneList{grid-template-columns:1fr}.btn{min-height:78px}.label{font-size:17px}.timer{font-size:26px}.logFlow{height:480px}.logItem{font-size:15px;width:96%}.logItem:nth-child(6n+1){margin-left:0}.logItem:nth-child(6n+2){margin-left:7px}.logItem:nth-child(6n+3){margin-left:14px}.logItem:nth-child(6n+4){margin-left:21px}.logItem:nth-child(6n+5){margin-left:28px}.logItem:nth-child(6n+6){margin-left:35px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>CPRタイマー <span class="ver">Ver.1.7</span></h1>
      <div class="compactHead"><span id="clock" class="clock">--:--:--</span><span class="elapsedParen">（CPR開始から<span id="cprElapsed">0:00</span>）</span></div>
    </div>

    <div class="main">
      <section class="timeline">
        <div id="logFlow" class="logFlow"></div>
      </section>

      <aside class="sideWrap">
        <div class="sideTitle">サイクル管理</div>
        <div id="timerGrid" class="sideGrid">
          <button class="btn cprPulse" id="cprPulseBtn" data-type="cprPulse"><div class="label">CPR開始</div><div class="sub" id="cprPulseSub">開始／2分評価</div><div class="timer" id="cprPulseTimer">--:--</div></button>
          <button class="btn shock" id="shockBtn" data-type="shock"><div class="label">ショック⚡️</div><div class="sub" id="shockSub">次：1回目</div><div class="timer" id="shockTimer">--:--</div></button>
          <button class="btn epi hidden" id="epiBtn" data-type="epi"><div class="label">アドレナリン</div><div class="sub" id="epiSub">次：1投目</div><div class="timer" id="epiTimer">--:--</div></button>
        </div>

        <div class="sideTitle">単発の処置</div>
        <div class="sideGrid" id="oneShotGrid">
          <button class="btn airway" id="ltBtn" data-group="airway"><div class="label">LT挿入完了</div><div class="sub">実施時刻を記録</div></button>
          <button class="btn airway" id="intBtn" data-group="airway"><div class="label">挿管完了</div><div class="sub">実施時刻を記録</div></button>
          <button class="btn iv" id="ivBtn" data-key="iv"><div class="label">IV確保</div><div class="sub">実施時刻を記録</div></button>
          <button class="btn lucas" id="lucasOnBtn" data-group="lucas"><div class="label">ルーカス装着</div><div class="sub">自動心マ機</div></button>
          <button class="btn lucas" id="lucasOffBtn" data-group="lucas"><div class="label">ルーカス適用外</div><div class="sub">自動心マ機</div></button>
        </div>

        <div class="doneArea">
          <div class="sideTitle">完了済み・下段</div>
          <div id="doneList" class="doneList"></div>
        </div>
        <button class="btn reset" id="resetBtn">全リセット</button>
      </aside>
    </div>
    
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const state = {
    cprStart:null, logs:[], epiCount:0, shockCount:0,
    epiEnd:null, shockEnd:null, cprPulseEnd:null, audioReady:false,
    done:{}, cprPressed:false
  };

  function pad(n){return String(n).padStart(2,'0')}
  function hhmm(d=new Date()){return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
  function hhmmss(d=new Date()){return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
  function mmss(ms){const total=Math.max(0,Math.ceil(ms/1000));return `${pad(Math.floor(total/60))}:${pad(total%60)}`;}
  function elapsedText(start){if(!start) return '0:00'; const sec=Math.floor((Date.now()-start)/1000); return `${Math.floor(sec/60)}:${pad(sec%60)}`;}

  let audioCtx=null;
  function readyAudio(){
    if(state.audioReady && audioCtx) return;
    try{
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      state.audioReady=true;
    }catch(e){}
  }
  function tone(freq=880,dur=0.12,delay=0,type='sine',gain=0.045){
    readyAudio(); if(!audioCtx) return;
    const start=audioCtx.currentTime+delay;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,start);
    g.gain.setValueAtTime(0.0001,start);
    g.gain.exponentialRampToValueAtTime(gain,start+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(start); o.stop(start+dur+0.02);
  }
  function playSound(kind){
    readyAudio();
    if(kind==='cpr'){tone(660,.10,0); tone(880,.12,.10); if(navigator.vibrate) navigator.vibrate(80); return;}
    if(kind==='shock'){tone(220,.08,0,'square',.035); tone(880,.16,.08,'square',.035); if(navigator.vibrate) navigator.vibrate([80,40,80]); return;}
    if(kind==='epi'){tone(740,.09,0); tone(740,.09,.13); tone(980,.12,.26); if(navigator.vibrate) navigator.vibrate(60); return;}
    if(kind==='one'){tone(520,.08,0); tone(700,.08,.09); if(navigator.vibrate) navigator.vibrate(50); return;}
    if(kind==='reset'){tone(360,.10,0); tone(260,.14,.11); if(navigator.vibrate) navigator.vibrate(80); return;}
    if(kind==='alert4'){tone(980,.12,0,'triangle',.055); tone(980,.12,.20,'triangle',.055); tone(980,.20,.40,'triangle',.055); if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]); return;}
    if(kind==='alert2'){tone(880,.10,0,'square',.045); tone(660,.10,.15,'square',.045); tone(880,.10,.30,'square',.045); tone(660,.18,.45,'square',.045); if(navigator.vibrate) navigator.vibrate([160,80,160]); return;}
    tone();
  }
  function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

  function addLog(text, color='#ffd86b', meta=''){
    const item={time:hhmm(), text, color, meta}; state.logs.unshift(item); renderLogs();
  }
  function renderLogs(){
    const box=$('logFlow'); box.innerHTML='';
    state.logs.forEach(l=>{const div=document.createElement('div'); div.className='logItem'; div.style.borderLeftColor=l.color; div.innerHTML=`<span class="time">${l.time}</span>${escapeHtml(l.text)}${l.meta?`<div class="meta">${escapeHtml(l.meta)}</div>`:''}`; box.appendChild(div);});
  }
  function hideOneShot(key){
    document.querySelectorAll(`[data-key="${key}"],[data-group="${key}"]`).forEach(btn=>btn.classList.add('hidden'));
  }
  function showOneShot(key){
    document.querySelectorAll(`[data-key="${key}"],[data-group="${key}"]`).forEach(btn=>btn.classList.remove('hidden'));
  }
  function completeOneShot(key,label,text,color){
    state.done[key]={label,text,time:hhmm(),color}; hideOneShot(key); renderDone(); addLog(`${text}（${state.done[key].time}）`,color);
  }
  function renderDone(){
    const list=$('doneList'); list.innerHTML='';
    Object.entries(state.done).forEach(([key,d])=>{const card=document.createElement('div'); card.className='doneCard'; card.innerHTML=`<b>${escapeHtml(d.label)}</b>${escapeHtml(d.text)}<br>${d.time}<button data-undo="${key}">上に戻す</button>`; list.appendChild(card);});
    list.querySelectorAll('[data-undo]').forEach(btn=>btn.addEventListener('click',()=>{const key=btn.dataset.undo; delete state.done[key]; showOneShot(key); renderDone();}));
  }

  function countdown(end, el){
    if(!end){el.textContent='--:--'; el.classList.remove('expired'); return Infinity;}
    const diff=end-Date.now();
    if(diff<=0){el.textContent='00:00'; el.classList.add('expired'); return 0;}
    el.textContent=mmss(diff); el.classList.remove('expired'); return diff;
  }
  let epiAlerted=false, shockAlerted=false, cprPulseAlerted=false;
  function sortTimerButtons(){
    const grid=$('timerGrid');
    const items=[
      {el:$('cprPulseBtn'), remain:state.cprPulseEnd?Math.max(0,state.cprPulseEnd-Date.now()):999999999},
      {el:$('shockBtn'), remain:state.shockEnd?Math.max(0,state.shockEnd-Date.now()):999999999},
      {el:$('epiBtn'), remain:state.epiEnd?Math.max(0,state.epiEnd-Date.now()):999999999}
    ];
    items.sort((a,b)=>a.remain-b.remain);
    items.forEach(i=>grid.appendChild(i.el));
  }
  function tick(){
    $('clock').textContent=hhmmss(); $('cprElapsed').textContent=elapsedText(state.cprStart);
    countdown(state.epiEnd,$('epiTimer')); countdown(state.shockEnd,$('shockTimer')); countdown(state.cprPulseEnd,$('cprPulseTimer')); sortTimerButtons();
    if(state.epiEnd && Date.now()>=state.epiEnd && !epiAlerted){epiAlerted=true; playSound('alert4');}
    if(state.shockEnd && Date.now()>=state.shockEnd && !shockAlerted){shockAlerted=true; playSound('alert2');}
    if(state.cprPulseEnd && Date.now()>=state.cprPulseEnd && !cprPulseAlerted){cprPulseAlerted=true; playSound('alert2');}
  }

  $('cprPulseBtn').addEventListener('click',()=>{
    readyAudio(); playSound('cpr');
    state.cprPulseEnd=Date.now()+2*60*1000; cprPulseAlerted=false;
    if(!state.cprStart){state.cprStart=Date.now(); state.cprPressed=true; $('cprPulseSub').textContent='2分評価'; addLog(`CPR開始（${hhmm()}）`,'#9df2a6','2:00カウントダウン開始');}
    else {addLog(`パルスチェック（${hhmm()}）`,'#9df2a6','2:00カウントダウン開始');}
    tick();
  });
  $('ivBtn').addEventListener('click',()=>{readyAudio(); playSound('one'); completeOneShot('iv','IV確保','IV確保完了','#9cf7ff'); $('epiBtn').classList.remove('hidden'); sortTimerButtons();});
  $('ltBtn').addEventListener('click',()=>{readyAudio(); playSound('one'); completeOneShot('airway','LT／挿管','LT挿入完了','#9df2a6');});
  $('intBtn').addEventListener('click',()=>{readyAudio(); playSound('one'); completeOneShot('airway','LT／挿管','挿管完了','#9df2a6');});
  $('lucasOnBtn').addEventListener('click',()=>{readyAudio(); playSound('one'); completeOneShot('lucas','ルーカス','ルーカス装着','#ffd86b');});
  $('lucasOffBtn').addEventListener('click',()=>{readyAudio(); playSound('one'); completeOneShot('lucas','ルーカス','ルーカス適用外','#ffd86b');});
  $('epiBtn').addEventListener('click',()=>{readyAudio(); playSound('epi'); state.epiCount++; state.epiEnd=Date.now()+4*60*1000; epiAlerted=false; $('epiSub').textContent=`次：${state.epiCount+1}投目`; addLog(`アド${state.epiCount}投目（${hhmm()}）`,'#8bdcff','4:00カウントダウン開始'); tick();});
  $('shockBtn').addEventListener('click',()=>{readyAudio(); playSound('shock'); state.shockCount++; state.shockEnd=Date.now()+2*60*1000; shockAlerted=false; $('shockSub').textContent=`次：${state.shockCount+1}回目`; addLog(`ショック${state.shockCount}回目実施（${hhmm()}）`,'#ff7b7b','2:00カウントダウン開始'); tick();});
  $('resetBtn').addEventListener('click',()=>{
    if(!confirm('全ての記録をリセットしますか？')) return;
    playSound('reset');
    state.cprStart=null; state.logs=[]; state.epiCount=0; state.shockCount=0; state.epiEnd=null; state.shockEnd=null; state.cprPulseEnd=null; state.done={}; state.cprPressed=false; epiAlerted=false; shockAlerted=false; cprPulseAlerted=false;
    ['airway','iv','lucas'].forEach(showOneShot); $('epiBtn').classList.add('hidden'); $('epiSub').textContent='次：1投目'; $('shockSub').textContent='次：1回目'; $('cprPulseSub').textContent='開始／2分評価'; renderDone(); renderLogs(); tick();
  });
  renderDone(); renderLogs(); tick(); setInterval(tick,250);
})();
</script>
</body>
</html>
